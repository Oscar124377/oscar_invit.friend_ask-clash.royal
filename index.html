<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Site</title>

<style>
body{
  margin:0;
  background:black;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#image{
  display:none;
  width:100%;
  height:100%;
  object-fit:cover;
}

#cookies{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#222;
  color:white;
  padding:20px;
  text-align:center;
  font-family:Arial;
}

button{
  padding:10px 20px;
  font-size:16px;
}
</style>

</head>

<body>

<img id="image" src="image-du-mec.jpg">

<audio id="son" src="son-ultra-fort.mp3"></audio>

<div id="cookies">
Ce site utilise des cookies 🍪  
<br><br>
<button onclick="accepter()">Accepter</button>
</div>

<script>
function accepter(){
  document.getElementById("cookies").style.display="none";
  document.getElementById("image").style.display="block";

  let son = document.getElementById("son");
  son.play();
}
</script>

</body>
</html>
