<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>

<style>
body{
  margin:0;
  background:black;
}

#image{
  display:none;
  width:100%;
  height:100vh;
  object-fit:cover;
}

#cookies{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#333;
  color:white;
  padding:20px;
  text-align:center;
}
</style>

</head>
<body>

<img id="image" src="image-du-mec.jpg">

<audio id="son" src="son-ultra-fort.mp3"></audio>

<div id="cookies">
Ce site utilise des cookies 🍪  
<br><br>
<button id="btn">Accepter</button>
</div>

<script>

document.getElementById("btn").onclick = function(){

document.getElementById("cookies").style.display = "none";
document.getElementById("image").style.display = "block";

document.getElementById("son").play();

};

</script>

</body>
</html>
