<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
}

#image{
  display:none;
  width:100%;
  height:100vh;
  object-fit:cover;
}

#cookieBox{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:700px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#cookieButtons{
  margin-top:15px;
  text-align:right;
}

button{
  padding:10px 16px;
  margin-left:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

#accept{
  background:#2e7dff;
  color:white;
}

#reject{
  background:#e0e0e0;
}

</style>
</head>

<body>

<img id="image" src="image-du-mec.jpg">

<audio id="son" src="son-ultra-fort.mp3"></audio>

<div id="cookieBox">
<b>Nous utilisons des cookies</b><br>
Nous utilisons des cookies pour améliorer votre expérience sur notre site.

<div id="cookieButtons">
<button id="reject">Refuser</button>
<button id="accept">Accepter tout</button>
</div>
</div>

<script>

document.getElementById("accept").onclick = function(){

document.getElementById("cookieBox").style.display="none";
document.getElementById("image").style.display="block";

let son = document.getElementById("son");
son.currentTime = 0;
son.play();

};

document.getElementById("reject").onclick = function(){
document.getElementById("cookieBox").style.display="none";
};

</script>

</body>
</html>
