<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jump Scare</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<img id="scare" src="image-du-mec.jpg">

<audio id="son" src="son-ultra-fort.mp3"></audio>

<script>
// Fonction pour lancer le son (et s'assurer que ça fonctionne même si autoplay est bloqué)
function lancerSon() {
  const son = document.getElementById("son");
  son.play().catch(() => {
    // si autoplay bloqué, on attend un clic
    document.body.addEventListener('click', () => son.play());
  });
}

// Lance le son dès que la page est chargée
window.onload = lancerSon;
</script>

</body>
</html>
